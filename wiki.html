<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .error {
            color: red;
            margin: 0;
        }
        .registration-form {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .field {
            margin-bottom: 15px;
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    < form action="" method="" id="registrationForm" class="registration-form">
        <h2>Registration Form</h2>
        <div class="field">
            <label for="fullname">Full Name:</label><br>
            <input type="text" id="fullname" name="fullname"><br>
        </div>
        <div class="field">
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required><br>
        </div>
        <button type="submit">Submit</button>
    </form>

    <a href="#" onclick="document.getElementById('showContent').textContent='Invalid Email'">Show content</a>
    <a href="#" onclick="document.getElementById('showContent').textContent=' '">Hide content</a>
    <p id="showContent" class="error"></p>
